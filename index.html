<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System (KDS) - Pro Dark</title>
    <style>
        /* ==========================================================================
            1. VARIABLES Y CONFIGURACIÓN BASE (Tema Oscuro)
           ========================================================================== */
        :root {
            --bg-principal: #121214;
            --bg-panel: #1a1a1e;
            --bg-tarjeta: #222227;
            --texto-principal: #ffffff;
            --texto-secundario: #a1a1aa;
            --borde: #2d2d34;

            /* Colores del Semáforo de Urgencia */
            --color-verde: #2E8B57;
            --color-amarillo: #FFDE54;
            --color-naranja: #f97316;
            --color-rojo: #ef4444;

            /* Modificadores de fondo sutiles para las tarjetas */
            --bg-verde: rgba(16, 185, 129, 0.1);
            --bg-amarillo: rgb(243, 239, 5);
            --bg-naranja: rgba(249, 115, 22, 0.1);
            --bg-rojo: rgba(239, 68, 68, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ==========================================================================
            2. PANEL DE CONTROL SUPERIOR (HEADER)
           ========================================================================== */
        header {
            background-color: var(--bg-panel);
            border-bottom: 2px solid var(--borde);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .info-general {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .contador-comandas {
            background: #2563eb;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .controles-config {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-custom {
            background-color: #124163;
            color: var(--texto-principal);
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--borde);
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        /* Agrega esto justo aquí abajo: */
            #btnFullscreen {

            padding: 3px 8px;
            font-size: 0.50rem;
            background-color: #c2410c; /* <- Cambia este código por el color de fondo que desees (ej: Naranja oscuro) */
            color: #ffffff;            /* <- Cambia este código por el color del texto (ej: Blanco) */
        }



        .btn-custom:hover {
            background-color: #52525b;
        }

        .btn-custom input[type="file"] {
            display: none;
        }
        
        /* CAJA DE TEXTO DEL AUDIO COMPACTA Y REDUCIDA */
        .input-audio-seleccionado {
            background-color: #1a1a1e;       /* Fondo oscuro que combina */
            color: #ffffff;                  /* Texto blanco */
            border: 1px solid var(--borde);
            padding: 5px 10px;               /* Reducido para que sea menos alto */
            border-radius: 5px;
            font-size: 0.8rem;               /* Letra ligeramente más pequeña */
            font-weight: bold;
            text-align: center;
            width: 135px;                    /* Más angosta */
            outline: none;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }
        
        /* ==========================================================================
           ESTILOS PARA BOTÓN DE MARCAR PRODUCTOS (X)
           ========================================================================== */
        .btn-tachar {
            background-color: #000000;
            color: #ffffff;
            border: none;
            width: 20px;
            height: 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
            margin-left: 10px;
            flex-shrink: 0;
        }
        
        .btn-tachar:active {
            transform: scale(0.9);
        }

        /* Botón cuando ya está entregado (Rojo) */
        .btn-tachar.completado {
            background-color: #ef4444 !important;
        }

        /* Contenedor del texto cuando está tachado (Rojo y con línea) */
        .producto-item-contenedor.completado {
            text-decoration: line-through;
            color: #ef4444 !important;
        }
        
        .producto-item-contenedor.completado span {
            color: #ef4444 !important;
        }

        /* Sombreado gris de fondo para cada plato */
        .fila-producto-sombreada {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #B8E2F5; /* Color amarillo de fondo */
            padding: 1px 5px;         
            border-radius: 4px;        
            margin-bottom: 4px  !important;    
            box-sizing: border-box;
        }

        .toggle-sonido {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }

        .toggle-sonido input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        /* ==========================================================================
           3. CUADRÍCULA DE COMANDAS (GRID 3x4 FIJO)
           ========================================================================== */
        main {
            flex-grow: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            height: calc(100vh - 80px);
            background-color: var(--bg-principal);
        }

        /* ESTILO PARA LA IMAGEN CUANDO NO HAY COMANDAS */
        .imagen-kds-vacio {
            grid-column: 1 / -1;
            grid-row: 1 / -1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .imagen-kds-vacio img {
            max-width: 80%;
            max-height: 80%;
            object-fit: contain;
        }

        /* ==========================================================================
           4. ESTILO DE LAS TARJETAS (ESTADOS DEL SEMÁFORO)
           ========================================================================== */
        .tarjeta-comanda {
            background-color: var(--bg-tarjeta);
            border: 4px solid var(--borde);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            transition: border-color 0.3s, background-color 0.3s;
            position: relative;
        }

        .tarjeta-comanda.vacía {
            border: 2px dashed #2d2d34;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3f3f46;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .comanda-normal {
            border-color: var(--color-verde);
            background-color: var(--bg-verde);
            --color-estado: var(--color-verde);
        }
        .comanda-advertencia {
            border-color: var(--color-amarillo);
            background-color: var(--bg-amarillo);
            --color-estado: var(--color-amarillo);
        }
        .comanda-critico {
            border-color: var(--color-naranja);
            background-color: var(--bg-naranja);
            --color-estado: var(--color-naranja);
        }
        .comanda-advertencia .id-comanda,
        .comanda-advertencia .id-mesa,
        .comanda-advertencia .id-mesa span {
            color: #000000 !important;
        }
        .comanda-urgente {
            border-color: var(--color-rojo);
            background-color: var(--bg-rojo);
            --color-estado: var(--color-rojo);
            animation: pulso-urgente 2s infinite alternate;
        }

        @keyframes pulso-urgente {
            0% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
            100% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        }

        /* Cabecera de la Tarjeta */
        .tarjeta-header {
            padding: 10px 12px;
            background-color: var(--color-estado);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header-identificadores {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .id-comanda {
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .id-mesa {
            font-size: 1.3rem;
            color: #FDFCFC;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tipo-pedido-contenedor {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 18px;
        }

        .tipo-pedido-icon {
            max-width: 250%;
            max-height: 250%;
            object-fit: contain;
        }

        /* Cuerpo / Lista de Productos */
        .tarjeta-body {
            padding: 12px;
            flex-grow: 1;
            overflow-y: auto !important; 
            max-height: 180px;           
            background-color: #FDFCFC;
        }

        /* --- Estilos de la barra de scroll --- */
        .tarjeta-body::-webkit-scrollbar {
            width: 7px !important;       
        }
        .tarjeta-body::-webkit-scrollbar-track {
            background: #f1f1f1 !important; 
            border-radius: 4px;
        }
        .tarjeta-body::-webkit-scrollbar-thumb {
            background: #222222 !important; 
            border-radius: 4px;
        }
        .tarjeta-body::-webkit-scrollbar-thumb:hover {
            background: #000000 !important; 
        }

        .lista-productos {
            list-style: none;
        }

        .lista-productos li {
            margin-bottom: 8px;
            font-size: 1.0rem;
            font-weight: bold;
            line-height: 1.3;
            display: flex;
            justify-content: space-between;
            color: #010101;
        }

        .cant-item {
            font-weight: bold;
            color: #010101;
            margin-right: 8px;
        }

        .nombre-item {
            flex-grow: 1;
        }

        /* Botón de nota interactivo */
        .btn-nota {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 5px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .btn-nota:hover {
            background-color: #222222;
        }

        /* Panel de alertas rojo para las indicaciones */
        .panel-alertas-nota {
            background-color: #ef4444;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            text-align: center;
            padding: 6px 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Pie de la Tarjeta (Tiempo y Botones) */
        .tarjeta-footer {
            padding: 3px 5px;
            background-color: rgb(12, 65, 99);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgb(255, 255, 255);
        }

        .tiempo-transcurrido {
            font-family: monospace;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .btn-despachar {
            background-color: #10b981;
            color: #ffffff;
            border: none;
            padding: 8px 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .btn-despachar:hover {
            background-color: #059669;
        }

        /* Scrollbar Custom */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <!-- ==========================================================================
       PANEL DE CONTROL SUPERIOR (HEADER)
       ========================================================================== -->
    <header>
        <div class="info-general">
            <h2> MIXTURAS - KDS </h2>
        </div>

        <div class="contador-comandas">
            COMANDA Nº: <span id="txtTotalComandas">0</span>
        </div>

        <div class="controles-config">
            <label class="btn-custom">
                Cargar MP3
                <input type="file" id="inputAudio" accept="audio/mp3">
            </label>

            <!-- NUEVO BOTÓN FULLSCREEN -->
            <button class="btn-custom" id="btnFullscreen">FULL</button>

            <label class="toggle-sonido">
                <input type="checkbox" id="checkSonido" checked>
                Sonido Activo
            </label>

            <input type="text" id="nombreAudio" class="input-audio-seleccionado" value="Nuevo Pedido.mp3" readonly>
        </div>
    </header>

    <!-- ==========================================================================
       CONTENEDOR DE CUADRÍCULA (GRID FIJO DE 12)
       ========================================================================== -->
    <main id="kdsGrid">
        <!-- Generado dinámicamente por JavaScript -->
    </main>

    <audio id="audioNotificacion" preload="auto"></audio>

    <!-- ==========================================================================
       LÓGICA JAVASCRIPT ES6+
       ========================================================================== -->
    <script> 
        // --- 1. ESTADO DE LA APLICACIÓN ---
        let totalComandasLlegadas = 0;
        let espacioComandas = Array(12).fill(null);
        let colaDeEspera = [];
        let audioUrlPorDefecto = "./sound/nuevo pedido.mp3";

        // Almacenes de memoria local
        let tiemposDeOrdenes = {};
        let productosTachados = {}; 
        let notasAbiertas = {}; 

        // Almacén local para guardar comandas ocultadas manualmente sin tocar la Base de Datos
        let comandasDespachadasLocalmente = {};

        const imagenesPedido = {
            "Local": "Resources/mesa.png",
            "Delivery": "Resources/delivery.png",
            "Para Llevar": "Resources/para llevar.png"
        };

        // --- 2. SELECTORES DOM ---
        const kdsGrid = document.getElementById('kdsGrid');
        const audioPlayer = document.getElementById('audioNotificacion');
        const checkSonido = document.getElementById('checkSonido');
        const btnFullscreen = document.getElementById('btnFullscreen');

        audioPlayer.src = audioUrlPorDefecto;

        // --- 3. FUNCIONALIDAD FULLSCREEN ---
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen()
                    .then(() => {
                        btnFullscreen.innerText = "NORMAL";
                    })
                    .catch(err => {
                        console.error(`Error al intentar activar pantalla completa: ${err.message}`);
                    });
            } else {
                document.exitFullscreen()
                    .then(() => {
                        btnFullscreen.innerText = "FULL";
                    });
            }
        });

        // Detectar si el usuario sale de pantalla completa usando la tecla ESC
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                btnFullscreen.innerText = "FULL";
            } else {
                btnFullscreen.innerText = "NORMAL";
            }
        });

        // --- 4. NUEVA FUNCIÓN PARA REALIZAR POLLING AL BACKEND ---
        function consultarBaseDatosReal() {
            fetch('http://localhost:3000/api/kds/comandas')
            .then(response => {
                if (!response.ok) {
                    throw new Error("Error en la respuesta de Node");
                }
                return response.json();
            })
            .then(platosSQL => {
                console.log("Datos recibidos de la BD:", platosSQL);
                
                if (!Array.isArray(platosSQL) || platosSQL.length === 0) {
                    espacioComandas = Array(12).fill(null);
                    totalComandasLlegadas = 0;
                    const txtTotalComandas = document.getElementById('txtTotalComandas');
                    if (txtTotalComandas) txtTotalComandas.innerText = "0";
                    renderizarPantalla();
                    return;
                }

                // AGRUPAR platos individuales por "Orden" o "idventa"
                const mapaComandas = {};

                platosSQL.forEach(item => {
                    const idVentaRaw = item.Orden || item.idventa;
                    if (idVentaRaw === undefined || idVentaRaw === null) return; 

                    const idVenta = String(idVentaRaw);

                    // Si la comanda ya fue despachada de manera local, la ignoramos por completo
                    if (comandasDespachadasLocalmente[idVenta]) return;

                    if (!mapaComandas[idVenta]) {
                        const nombreMesa = item.Mesa || `Mesa ${idVenta}`;
                        const destinoConsumo = (item.Donde_se_consumira || "").toUpperCase().trim();

                        // DETECTAR EL TIPO DE PEDIDO
                        let tipoPedido = "Local";
                        if (destinoConsumo === "DELIVERY" || nombreMesa.includes("DELIVERY")) {
                            tipoPedido = "Delivery";
                        } else if (destinoConsumo === "PARA LLEVAR" || nombreMesa.includes("LLEVAR")) {
                            tipoPedido = "Para Llevar";
                        }

                        const nombreCliente = item.Cliente && item.Cliente.trim() !== "-" ? item.Cliente.trim() : "";

                        mapaComandas[idVenta] = {
                            id: idVenta, 
                            tipo: tipoPedido, 
                            mesa: nombreMesa, 
                            cliente: nombreCliente, 
                            productos: [],
                            segundosTranscurridos: (typeof tiemposDeOrdenes !== 'undefined' && tiemposDeOrdenes[idVenta]) || 0,
                            mostrarNota: false,
                            notaVenta: item.Nota_venta && item.Nota_venta.trim() !== "-" ? item.Nota_venta : "" 
                        };
                    }
                    
                    mapaComandas[idVenta].productos.push({
                        cant: item.Cant || item.cantidad || 1, 
                        nombre: item.Producto || item.producto || "Plato sin descripción", 
                        notes: item.Notaproducto || item.Nota || "" 
                    });
                });

                const listaComandasAgrupadas = Object.values(mapaComandas);

                // Controlar la notificación sonora
                let hayNuevaOrden = false;
                if (typeof tiemposDeOrdenes !== 'undefined') {
                    listaComandasAgrupadas.forEach(nueva => {
                        if (tiemposDeOrdenes[nueva.id] === undefined) {
                            tiemposDeOrdenes[nueva.id] = 0;
                            hayNuevaOrden = true;
                        }
                    });
                }

                if (hayNuevaOrden && typeof checkSonido !== 'undefined' && checkSonido.checked && typeof audioPlayer !== 'undefined') {
                    audioPlayer.currentTime = 0;
                    audioPlayer.play().catch(e => console.log("Interacción requerida para audio."));
                }

                // REPARTIR en los 12 Slots
                let nuevasRanuras = Array(12).fill(null);
                let temporalesFueraDePantalla = [];

                listaComandasAgrupadas.forEach((comanda, idx) => {
                    if (idx < 12) {
                        nuevasRanuras[idx] = comanda;
                    } else {
                        temporalesFueraDePantalla.push(comanda);
                    }
                });

                espacioComandas = nuevasRanuras;
                colaDeEspera = temporalesFueraDePantalla;
                
                totalComandasLlegadas = listaComandasAgrupadas.length;
                
                const txtTotalComandas = document.getElementById('txtTotalComandas');
                if (txtTotalComandas) {
                    txtTotalComandas.innerText = totalComandasLlegadas;
                }

                renderizarPantalla();
            })
            .catch(error => {
                console.error("Error conectando con el backend Node.js o procesando datos:", error);
                // Evitamos pantalla negra dibujando los slots vacíos
                espacioComandas = Array(12).fill(null);
                renderizarPantalla();
            });
        }

        // --- 5. CONFIGURACIONES DE AUDIO ---
        document.getElementById('inputAudio').addEventListener('change', function(e) {
            const archivo = e.target.files[0];
            if (archivo) {
                audioPlayer.src = URL.createObjectURL(archivo);
            }
        });

        // --- 6. FUNCIONES DE INTERACCIÓN -----
        function toggleNota(index) {
            const comanda = espacioComandas[index];
            if (comanda) {
                notasAbiertas[comanda.id] = !notasAbiertas[comanda.id];
                renderizarPantalla(); 
            }
        }

        // Función modificada para ocultar localmente al instante sin tocar la base de datos
        function despacharComanda(index) {
            const comanda = espacioComandas[index];
            if (!comanda) return;

            // 1. Guardamos localmente el ID de la comanda despachada para que el polling de la BD no la vuelva a meter
            comandasDespachadasLocalmente[comanda.id] = true;

            // 2. Eliminamos los datos temporales del almacenamiento en caché local
            delete tiemposDeOrdenes[comanda.id];
            Object.keys(productosTachados).forEach(llave => {
                if (llave.startsWith(`${comanda.id}-`)) {
                    delete productosTachados[llave];
                }
            });
            delete notasAbiertas[comanda.id];

            // 3. Quitamos visualmente la comanda de su ranura
            espacioComandas.splice(index, 1);

            // 4. Traemos la siguiente de la cola de espera si existiera
            if (colaDeEspera.length > 0) {
                const siguienteComanda = colaDeEspera.shift();
                espacioComandas.push(siguienteComanda);
            } else {
                espacioComandas.push(null);
            }

            // 5. Restamos una unidad al contador superior de comandas
            totalComandasLlegadas = Math.max(0, totalComandasLlegadas - 1);
            const txtTotalComandas = document.getElementById('txtTotalComandas');
            if (txtTotalComandas) {
                txtTotalComandas.innerText = totalComandasLlegadas;
            }

            renderizarPantalla();
        }

        function toggleTacharProducto(comandaId, productoIdx) {
            const llave = `${comandaId}-${productoIdx}`;
            productosTachados[llave] = !productosTachados[llave];
            renderizarPantalla(); 
        }

        // --- 7. TEMPORIZADOR LOCAL RECTIFICADO (SUMA TIEMPO A ABSOLUTAMENTE TODAS LAS ÓRDENES) ---
        setInterval(() => {
            let cambios = false;

            // 1. Sumar tiempo a las comandas visibles en pantalla (los 12 slots)
            espacioComandas.forEach(comanda => {
                if (comanda) {
                    comanda.segundosTranscurridos++;
                    tiemposDeOrdenes[comanda.id] = comanda.segundosTranscurridos; 
                    cambios = true;
                }
            });

            // 2. NUEVO: Sumar tiempo también a las comandas en cola que no caben en pantalla
            colaDeEspera.forEach(comanda => {
                if (comanda) {
                    comanda.segundosTranscurridos++;
                    tiemposDeOrdenes[comanda.id] = comanda.segundosTranscurridos;
                    // No activa 'cambios = true' porque las de la cola no necesitan redibujarse inmediatamente en el DOM
                }
            });

            if (cambios) {
                renderizarPantalla();
            }
        }, 1000);

        // Consultar la Base de Datos automáticamente cada 3 segundos
        setInterval(consultarBaseDatosReal, 3000);

        // --- 8. RENDERIZADO DE LA INTERFAZ ---
        function renderizarPantalla() {
            // Guardar la posición actual del scroll de cada tarjeta activa
            const posicionesScroll = {};
            const tarjetasActivas = kdsGrid.querySelectorAll('.tarjeta-comanda');
            tarjetasActivas.forEach(tarjeta => {
                const idComandaSpan = tarjeta.querySelector('.id-comanda');
                const bodyTarjeta = tarjeta.querySelector('.tarjeta-body');
                if (idComandaSpan && bodyTarjeta) {
                    const idComanda = idComandaSpan.innerText.replace('ORDEN #', '').trim();
                    posicionesScroll[idComanda] = bodyTarjeta.scrollTop; 
                }
            });

            kdsGrid.innerHTML = ''; 

            // VERIFICACIÓN: SI NO HAY NINGUNA COMANDA EN TODO EL SISTEMA, SE DIBUJA SOLO LA IMAGEN
            if (totalComandasLlegadas === 0) {
                const divImagenInicial = document.createElement('div');
                divImagenInicial.className = 'imagen-kds-vacio';
                divImagenInicial.innerHTML = `<img src="Resources/imagen_inicial.png" alt="Esperando comandas...">`;
                kdsGrid.appendChild(divImagenInicial);
                return; // Detiene el código aquí para que no dibuje los Slots vacíos
            }

            espacioComandas.forEach((comanda, index) => {
                if (comanda === null) {
                    const divVacio = document.createElement('div');
                    divVacio.className = 'tarjeta-comanda vacía';
                    divVacio.innerText = `SLOT ${index + 1}`;
                    kdsGrid.appendChild(divVacio);
                } else {
                    const minutos = comanda.segundosTranscurridos / 60;
                    let claseSemaforo = 'comanda-normal';

                    if (minutos >= 4 && minutos < 8) {
                        claseSemaforo = 'comanda-advertencia';
                    } else if (minutos >= 8 && minutes < 12) { 
                        claseSemaforo = 'comanda-critico';
                    } else if (minutos >= 12) {
                        claseSemaforo = 'comanda-urgente';
                    }

                    const mm = String(Math.floor(comanda.segundosTranscurridos / 60)).padStart(2, '0');
                    const ss = String(comanda.segundosTranscurridos % 60).padStart(2, '0');

                    let notasDeLaOrden = [];
                    let htmlProductos = '';

                    if (comanda.notaVenta && comanda.notaVenta.trim() !== "") {
                        notasDeLaOrden.push(comanda.notaVenta.trim());
                    }

                    comanda.productos.forEach((p, pIdx) => {
                        const llaveProducto = `${comanda.id}-${pIdx}`;
                        const estaTachado = productosTachados[llaveProducto] || false;

                        const claseTachado = estaTachado ? 'completado' : '';
                        const claseBoton = estaTachado ? 'btn-tachar completado' : 'btn-tachar';

                        htmlProductos += `
                            <li class="fila-producto-sombreada">
                                <div class="producto-item-contenedor ${claseTachado}" style="display: flex; align-items: center; flex-grow: 1;">
                                    <span class="cant-item">${p.cant}</span>
                                    <span class="nombre-item">${p.nombre}</span>
                                </div>
                                <button class="${claseBoton}" onclick="toggleTacharProducto('${comanda.id}', ${pIdx})">X</button>
                            </li>
                        `;
                        if (p.notes || (p.notas && p.notas.trim() !== "" && p.notas.trim() !== "-")) {
                            const notaTexto = p.notas ? p.notas.trim() : p.notes.trim();
                            notasDeLaOrden.push(notaTexto);
                        }
                    });

                    let textoNotaFinal = notasDeLaOrden.join(" + ");

                    let textoCabecera = "";
                    if (comanda.tipo === "Delivery" || comanda.tipo === "Para Llevar") {
                        if (comanda.cliente) {
                            textoCabecera = `(${comanda.cliente})`;
                        } else {
                            textoCabecera = comanda.mesa
                                .replace("!@DELIVERY@!", "")
                                .replace("!@PARA LLEVAR@!", "")
                                .trim();
                        }
                    } else {
                        textoCabecera = comanda.mesa;
                    }

                    const divTarjeta = document.createElement('div');
                    divTarjeta.className = `tarjeta-comanda ${claseSemaforo}`;
                    divTarjeta.innerHTML = `
                        <div class="tarjeta-header">
                            <div class="header-identificadores">
                                <span class="id-comanda">ORDEN #${comanda.id}</span>
                                <span class="id-mesa">
                                    ${textoCabecera}
                                </span>
                            </div>
                            <div class="tipo-pedido-contenedor" title="${comanda.tipo}">
                                <img class="tipo-pedido-icon" src="${imagenesPedido[comanda.tipo] || imagenesPedido['Local']}" alt="${comanda.tipo}">
                            </div>
                        </div>

                        <div class="tarjeta-body">
                            <ul class="lista-productos">
                                ${htmlProductos}
                            </ul>
                        </div>

                        ${(textoNotaFinal && notasAbiertas[comanda.id]) ? `
                            <div class="panel-alertas-nota">
                                ${textoNotaFinal}
                            </div>
                        ` : ''}

                        <div class="tarjeta-footer">
                            <span class="tiempo-transcurrido">${mm}:${ss}</span>

                            ${(textoNotaFinal && textoNotaFinal.trim() !== "") ? `
                                <button class="btn-nota" onclick="toggleNota(${index})">NOTA</button>
                            ` : `<div style="flex-grow:1;"></div>`}

                            <button class="btn-despachar" onclick="despacharComanda(${index})">Listo</button>
                        </div>
                    `;
                    kdsGrid.appendChild(divTarjeta);

                    // Restaurar el scroll guardado de esta tarjeta
                    if (posicionesScroll[comanda.id] !== undefined) {
                        const bodyReciente = divTarjeta.querySelector('.tarjeta-body');
                        if (bodyReciente) {
                            bodyReciente.scrollTop = posicionesScroll[comanda.id];
                        }
                    }
                }
            });
        }

        // --- 9. CARGA INICIAL ---
        window.addEventListener('DOMContentLoaded', () => {
            consultarBaseDatosReal();
        });
    </script>
</body>
</html>
