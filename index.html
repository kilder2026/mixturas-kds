<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Display System (KDS) - Pro Dark</title>
    <style>
        /* ==========================================================================
            1. VARIABLES Y CONFIGURACIÓN BASE (Tema Oscuro)
           ========================================================================== */
        :root {
            --bg-principal: #121214;
            --bg-panel: #1a1a1e;
            --bg-tarjeta: #222227;
            --texto-principal: #ffffff;
            --texto-secundario: #a1a1aa;
            --borde: #2d2d34;

            /* Colores del Semáforo de Urgencia */
            --color-verde: #2E8B57;
            --color-amarillo: #FFDE54;
            --color-naranja: #f97316;
            --color-rojo: #ef4444;

            /* Modificadores de fondo sutiles para las tarjetas */
            --bg-verde: rgba(16, 185, 129, 0.1);
            --bg-amarillo: rgb(243, 239, 5);
            --bg-naranja: rgba(249, 115, 22, 0.1);
            --bg-rojo: rgba(239, 68, 68, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ==========================================================================
            2. PANEL DE CONTROL SUPERIOR (HEADER)
           ========================================================================== */
        header {
            background-color: var(--bg-panel);
            border-bottom: 2px solid var(--borde);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .info-general {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .contador-comandas {
            background: #2563eb;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .controles-config {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-custom {
            background-color: #124163;
            color: var(--texto-principal);
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid var(--borde);
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-custom:hover {
            background-color: #52525b;
        }

        .btn-custom input[type="file"] {
            display: none;
        }
        /* ==========================================================================
           ESTILOS PARA BOTÓN DE MARCAR PRODUCTOS (X)
           ========================================================================== */
        .btn-tachar {
            background-color: #000000;
            color: #ffffff;
            border: none;
            width: 20px;
            height: 20px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s, transform 0.1s;
            margin-left: 10px;
            flex-shrink: 0;
        }
        
        .btn-tachar:active {
            transform: scale(0.9);
        }

        /* Botón cuando ya está entregado (Rojo) */
        .btn-tachar.completado {
            background-color: #ef4444 !important;
        }

        /* Contenedor del texto cuando está tachado (Rojo y con línea) */
        .producto-item-contenedor.completado {
            text-decoration: line-through;
            color: #ef4444 !important;
        }
        
        .producto-item-contenedor.completado span {
            color: #ef4444 !important;
        }

        /* Sombreado gris de fondo para cada plato */
.fila-producto-sombreada {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: #FAFAD2; /* Color gris de fondo */
    padding: 1px 5px;         /* Espaciado interno para dar holgura al texto */
    border-radius: 4px;        /* Bordes ligeramente redondeados */
    margin-bottom: 4px  !important;    /* Separación sutil entre platos */
    box-sizing: border-box;
}

        .toggle-sonido {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
        }

        .toggle-sonido input {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        /* ==========================================================================
           3. CUADRÍCULA DE COMANDAS (GRID 3x4 FIJO)
           ========================================================================== */
        main {
            flex-grow: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            height: calc(100vh - 80px);
            background-color: var(--bg-principal);
        }

        /* ==========================================================================
           4. ESTILO DE LAS TARJETAS (ESTADOS DEL SEMÁFORO)
           ========================================================================== */
        .tarjeta-comanda {
            background-color: var(--bg-tarjeta);
            border: 4px solid var(--borde);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            transition: border-color 0.3s, background-color 0.3s;
            position: relative;
        }

        .tarjeta-comanda.vacía {
            border: 2px dashed #2d2d34;
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #3f3f46;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .comanda-normal {
            border-color: var(--color-verde);
            background-color: var(--bg-verde);
            --color-estado: var(--color-verde);
        }
        .comanda-advertencia {
            border-color: var(--color-amarillo);
            background-color: var(--bg-amarillo);
            --color-estado: var(--color-amarillo);
        }
        .comanda-critico {
            border-color: var(--color-naranja);
            background-color: var(--bg-naranja);
            --color-estado: var(--color-naranja);
        }
        .comanda-advertencia .id-comanda,
        .comanda-advertencia .id-mesa,
        .comanda-advertencia .id-mesa span {
            color: #000000 !important;
        }
        .comanda-urgente {
            border-color: var(--color-rojo);
            background-color: var(--bg-rojo);
            --color-estado: var(--color-rojo);
            animation: pulso-urgente 2s infinite alternate;
        }

        @keyframes pulso-urgente {
            0% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
            100% { box-shadow: 0 0 15px rgba(239, 68, 68, 0.6); }
        }

        /* Cabecera de la Tarjeta */
        .tarjeta-header {
            padding: 10px 12px;
            background-color: var(--color-estado);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .header-identificadores {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .id-comanda {
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .id-mesa {
            font-size: 1.3rem;
            color: #FDFCFC;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tipo-pedido-contenedor {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 18px;
        }

        .tipo-pedido-icon {
            max-width: 250%;
            max-height: 250%;
            object-fit: contain;
        }

        /* Cuerpo / Lista de Productos */
        .tarjeta-body {
           padding: 12px;
            flex-grow: 1;
            overflow-y: auto !important; /* Fuerza a habilitar el scroll si se sale del cuadro */
            max-height: 180px;           /* Altura máxima fija para la zona blanca */
            background-color: #FDFCFC;
        }

        /* --- Estilos de la barra de scroll exclusiva para la zona blanca (.tarjeta-body) --- */
        .tarjeta-body::-webkit-scrollbar {
            width: 7px !important;       /* Grosor de la barra */
        }
        .tarjeta-body::-webkit-scrollbar-track {
            background: #f1f1f1 !important; /* Fondo gris claro */
            border-radius: 4px;
        }
        .tarjeta-body::-webkit-scrollbar-thumb {
            background: #222222 !important; /* Barra de arrastre oscura */
            border-radius: 4px;
        }
        .tarjeta-body::-webkit-scrollbar-thumb:hover {
            background: #000000 !important; /* Más oscuro al pasar el cursor */
        }

        .lista-productos {
            list-style: none;
        }

        .lista-productos li {
            margin-bottom: 8px;
            font-size: 1.0rem;
            font-weight: bold;
            line-height: 1.3;
            display: flex;
            justify-content: space-between;
            color: #010101;
        }

        .cant-item {
            font-weight: bold;
            color: #010101;
            margin-right: 8px;
        }

        .nombre-item {
            flex-grow: 1;
        }

        /* Botón de nota interactivo */
        .btn-nota {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 5px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.2s;
        }
        .btn-nota:hover {
            background-color: #222222;
        }

        /* Panel de alertas rojo para las indicaciones */
        .panel-alertas-nota {
            background-color: #ef4444;
            color: #ffffff;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            text-align: center;
            padding: 6px 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Pie de la Tarjeta (Tiempo y Botones) */
        .tarjeta-footer {
            padding: 3px 5px;
            background-color: rgb(12, 65, 99);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            border-top: 1px solid rgb(255, 255, 255);
        }

        .tiempo-transcurrido {
            font-family: monospace;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .btn-despachar {
            background-color: #10b981;
            color: #ffffff;
            border: none;
            padding: 8px 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .btn-despachar:hover {
            background-color: #059669;
        }

        /* Scrollbar Custom */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <!-- ==========================================================================
       PANEL DE CONTROL SUPERIOR (HEADER)
       ========================================================================== -->
    <header>
        <!-- Dejamos el título solo aquí adentro -->
        <div class="info-general">
            <h2> MIXTURAS - KDS </h2>
        </div>

        <!-- Colocamos el contador afuera para poder centrarlo de forma independiente -->
        <div class="contador-comandas">
            Nº DE COMANDAS: <span id="txtTotalComandas">0</span>
        </div>

        <div class="controles-config">
            <label class="btn-custom">
                Cargar MP3
                <input type="file" id="inputAudio" accept="audio/mp3">
            </label>

            <label class="toggle-sonido">
                <input type="checkbox" id="checkSonido" checked>
                Sonido Activo
            </label>

            <label class="btn-custom" style="background-color: #2563eb;">
                BD (JSON)
                <input type="file" id="inputJSON" accept=".json">
            </label>
        </div>
    </header>

    <!-- ==========================================================================
       CONTENEDOR DE CUADRÍCULA (GRID FIJO DE 12)
       ========================================================================== -->
    <main id="kdsGrid">
        <!-- Generado dinámicamente por JavaScript -->
    </main>

    <audio id="audioNotificacion" preload="auto"></audio>

    <!-- ==========================================================================
       LÓGICA JAVASCRIPT ES6+
       ========================================================================== -->
    <script>

        // --- NUEVA FUNCIÓN PARA REALIZAR POLLING AL BACKEND ---
     function consultarBaseDatosReal() {
    fetch('http://192.168.101.20:3000/api/kds/comandas')
    .then(response => response.json())
    .then(platosSQL => {
        if (!Array.isArray(platosSQL)) return;

        // 1. AGRUPAR platos individuales por el número de "Orden" que genera tu SP
        const mapaComandas = {};
        
        platosSQL.forEach(item => {
            // Usamos 'Orden' en lugar de 'idventa' porque es lo que retorna tu SP
            const idVenta = item.Orden; 
            if (!idVenta) return; // Si por alguna razón viene vacío, saltar

            if (!mapaComandas[idVenta]) {
                mapaComandas[idVenta] = {
                    id: idVenta.toString(),
                    tipo: "Local", 
                    // Tomamos el nombre real de la Mesa que extrae tu base de datos
                    mesa: item.Mesa || `Mesa ${idVenta}`, 
                    cliente: "",
                    productos: [],
                    segundosTranscurridos: tiemposDeOrdenes[idVenta] || 0,
                    mostrarNota: false
                };
            }
            
            mapaComandas[idVenta].productos.push({
                cant: item.Cant || 1, // Tu SP lo devuelve como 'Cant' con mayúscula
                nombre: item.Producto || "Plato sin descripción", // Tu SP lo devuelve como 'Producto'
                notas: item.Notaproducto || "" // Tu SP mapea las notas bajo 'Notaproducto'
            });
        });

        const listaComandasAgrupadas = Object.values(mapaComandas);

        // 2. Controlar la notificación sonora si entra una comanda nueva
        let hayNuevaOrden = false;
       if (typeof tiemposDeOrdenes !== 'undefined') {
            listaComandasAgrupadas.forEach(nueva => {
                if (tiemposDeOrdenes[nueva.id] === undefined) {
                    tiemposDeOrdenes[nueva.id] = 0;
                    hayNuevaOrden = true;
                }
            });
        }

        if (hayNuevaOrden && checkSonido && checkSonido.checked && audioPlayer) {
            // Aseguramos que cargue el MP3 local si no fue cambiado manualmente por el botón "Cargar MP3"
            if (!audioPlayer.src || audioPlayer.src.includes("assets.mixkit.co")) {
                audioPlayer.src = audioUrlPorDefecto;
            }
            audioPlayer.currentTime = 0;
            audioPlayer.play().catch(e => console.log("El navegador requiere interacción del usuario antes de reproducir sonido (haz clic en cualquier parte de la pantalla para activarlo)."));
        }

        // 3. REPARTIR en los 12 Slots del KDS respetando su posición
        let nuevasRanuras = Array(12).fill(null);
        let temporalesFueraDePantalla = [];

        listaComandasAgrupadas.forEach((comanda, idx) => {
            if (idx < 12) {
                nuevasRanuras[idx] = comanda;
            } else {
                temporalesFueraDePantalla.push(comanda);
            }
        });

        espacioComandas = nuevasRanuras;
        colaDeEspera = temporalesFueraDePantalla;
        
        totalComandasLlegadas = listaComandasAgrupadas.length;
        txtTotalComandas.innerText = totalComandasLlegadas;

        renderizarPantalla();
    })
    .catch(error => console.error("Error conectando con el backend Node.js:", error));
}

       // Consultar nuevas órdenes de la base de datos automáticamente cada 5 segundos
        setInterval(consultarBaseDatosReal, 5000);


        // --- 1. ESTADO DE LA APLICACIÓN ---
        // --- 1. ESTADO DE LA APLICACIÓN ---
        let totalComandasLlegadas = 0;
        let espacioComandas = Array(12).fill(null);
        let colaDeEspera = [];
        let audioUrlPorDefecto = "./sound/Nuevo Pedido.mp3";

        
        // Almacén en memoria para recordar los segundos que lleva transcurridos cada orden activa
        // (Evita que el tiempo de las tarjetas se reinicie a 00:00 cada 3 segundos al recargar la API)
        let tiemposDeOrdenes = {};
        let productosTachados = {}; // Guarda el estado visual { "IDORDEN-INDICEPRODUCTO": true/false
        // --- NUEVA VARIABLE (AGREGAR ESTA LÍNEA) ---
        let notasAbiertas = {}; // Guarda qué notas están visibles en pantalla { "IDORDEN": true/false

        const imagenesPedido = {

            "Local": "Resources/mesa.png",
            "Delivery": "Resources/Delivery.png",
            "Para Llevar": "Resources/Para llevar.png"

          //  "Local": `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23ffffff"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/></svg>`,
           // "Delivery": `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23ffffff"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>`,
           // "Para Llevar": `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="%23ffffff"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>`
        };

        // --- 2. SELECTORES DOM ---
        const kdsGrid = document.getElementById('kdsGrid');
        const txtTotalComandas = document.getElementById('totalComandas');
        const audioPlayer = document.getElementById('audioNotificacion');
        const checkSonido = document.getElementById('checkSonido');

        audioPlayer.src = audioUrlPorDefecto;

        // --- NUEVA FUNCIÓN PARA REALIZAR POLLING AL BACKEND ---
        function consultarBaseDatosReal() {
    fetch('http://192.168.101.20:3000/api/kds/comandas')
    .then(response => {
        if (!response.ok) {
            throw new Error("Error en la respuesta de Node");
        }
        return response.json();
    })
    .then(platosSQL => {
        console.log("Datos recibidos de la BD:", platosSQL);
        
        // 1. Si no hay datos, limpiamos la pantalla mostrando slots vacíos
        if (!Array.isArray(platosSQL) || platosSQL.length === 0) {
            espacioComandas = Array(12).fill(null);
            totalComandasLlegadas = 0;
            const txtTotalComandas = document.getElementById('txtTotalComandas');
            if (txtTotalComandas) txtTotalComandas.innerText = "0";
            renderizarPantalla();
            return;
        }

        // 2. AGRUPAR platos individuales por "Orden" o "idventa" de manera súper segura
        const mapaComandas = {};

        platosSQL.forEach(item => {
            const idVentaRaw = item.Orden || item.idventa;
            if (idVentaRaw === undefined || idVentaRaw === null) return; 

            const idVenta = String(idVentaRaw);

            if (!mapaComandas[idVenta]) {
                const nombreMesa = item.Mesa || `Mesa ${idVenta}`;
                const destinoConsumo = (item.Donde_se_consumira || "").toUpperCase().trim();

                // DETECTAR EL TIPO DE PEDIDO de forma exacta con la nueva columna
                let tipoPedido = "Local";
                if (destinoConsumo === "DELIVERY" || nombreMesa.includes("DELIVERY")) {
                    tipoPedido = "Delivery";
                } else if (destinoConsumo === "PARA LLEVAR" || nombreMesa.includes("LLEVAR")) {
                    tipoPedido = "Para Llevar";
                }

                // CAPTURAR EL NOMBRE DEL CLIENTE (si viene vacío, dejamos un texto alternativo o vacío)
                const nombreCliente = item.Cliente && item.Cliente.trim() !== "-" ? item.Cliente.trim() : "";

                mapaComandas[idVenta] = {
                    id: idVenta, 
                    tipo: tipoPedido, 
                    mesa: nombreMesa, 
                    cliente: nombreCliente, // <--- Guardamos el nombre del cliente aquí
                    productos: [],
                    segundosTranscurridos: (typeof tiemposDeOrdenes !== 'undefined' && tiemposDeOrdenes[idVenta]) || 0,
                    mostrarNota: false,
                    notaVenta: item.Nota_venta && item.Nota_venta.trim() !== "-" ? item.Nota_venta : "" // <--- Guardamos la nota de venta general por si quieres usarla
                };
            }
            
            mapaComandas[idVenta].productos.push({
                cant: item.Cant || item.cantidad || 1, 
                nombre: item.Producto || item.producto || "Plato sin descripción", 
                notas: item.Notaproducto || item.Nota || "" 
            });
        });
        //////////////////
        const listaComandasAgrupadas = Object.values(mapaComandas);

        // 3. Controlar la notificación sonora
        let hayNuevaOrden = false;
        if (typeof tiemposDeOrdenes !== 'undefined') {
            listaComandasAgrupadas.forEach(nueva => {
                if (tiemposDeOrdenes[nueva.id] === undefined) {
                    tiemposDeOrdenes[nueva.id] = 0;
                    hayNuevaOrden = true;
                }
            });
        }

        if (hayNuevaOrden && typeof checkSonido !== 'undefined' && checkSonido.checked && typeof audioPlayer !== 'undefined') {
            audioPlayer.currentTime = 0;
            audioPlayer.play().catch(e => console.log("Interacción requerida para audio."));
        }

        // 4. REPARTIR en los 12 Slots
        let nuevasRanuras = Array(12).fill(null);
        let temporalesFueraDePantalla = [];

        listaComandasAgrupadas.forEach((comanda, idx) => {
            if (idx < 12) {
                nuevasRanuras[idx] = comanda;
            } else {
                temporalesFueraDePantalla.push(comanda);
            }
        });

        espacioComandas = nuevasRanuras;
        colaDeEspera = temporalesFueraDePantalla;
        
        totalComandasLlegadas = listaComandasAgrupadas.length;
        
        const txtTotalComandas = document.getElementById('txtTotalComandas');
        if (txtTotalComandas) {
            txtTotalComandas.innerText = totalComandasLlegadas;
        }

        renderizarPantalla();
    })
    .catch(error => {
        console.error("Error conectando con el backend Node.js o procesando datos:", error);
        // Evitamos pantalla negra dibujando slots vacíos en caso de fallar
        espacioComandas = Array(12).fill(null);
        renderizarPantalla();
    });
}

        // --- 3. CONFIGURACIONES DE ASSETS ---
        document.getElementById('inputAudio').addEventListener('change', function(e) {
            const archivo = e.target.files[0];
            if (archivo) {
                audioPlayer.src = URL.createObjectURL(archivo);
            }
        });

        const configurarLectorImagen = (inputId, tipoKey) => {
            const elemento = document.getElementById(inputId);
    // Si el input no existe en el HTML, salimos de la función sin romper nada
    if (!elemento) return; 

    elemento.addEventListener('change', function(e) {
        const archivo = e.target.files[0];
        if (archivo) {
            const reader = new FileReader();
            reader.onload = function(event) {
                imagenesPedido[tipoKey] = event.target.result;
                renderizarPantalla();
            };
            reader.readAsDataURL(archivo);
        }
    });
        };
        configurarLectorImagen('imgLocal', 'Local');
        configurarLectorImagen('imgDelivery', 'Delivery');
        configurarLectorImagen('imgLlevar', 'Para Llevar');

        // Botón para cargar JSON manual si lo necesitas
        document.getElementById('inputJSON').addEventListener('change', function(e) {
            const archivo = e.target.files[0];
            if (archivo) {
                const lector = new FileReader();
                lector.onload = function(evt) {
                    try {
                        const nuevasComandas = JSON.parse(evt.target.result);
                        nuevasComandas.forEach(comanda => {
                            tiemposDeOrdenes[comanda.id] = 0;
                            const indiceVacio = espacioComandas.findIndex(slot => slot === null);
                            if (indiceVacio !== -1) {
                                espacioComandas[indiceVacio] = { ...comanda, segundosTranscurridos: 0, mostrarNota: false };
                            } else {
                                colaDeEspera.push({ ...comanda, segundosTranscurridos: 0, mostrarNota: false });
                            }
                        });
                        renderizarPantalla();
                    } catch (error) {
                        alert("Error de sintaxis en el archivo JSON cargado.");
                    }
                };
                lector.readAsText(archivo);
            }
        });

        // --- 4. FUNCIONES DE INTERACCIÓN -----
        function toggleNota(index) {
            const comanda = espacioComandas[index];
            if (comanda) {
                // Alternamos el estado usando el ID único de la orden
                notasAbiertas[comanda.id] = !notasAbiertas[comanda.id];
                renderizarPantalla(); // Redibujamos para aplicar el cambio visual
            }
        }

        function despacharComanda(index) {
            const comanda = espacioComandas[index];
            if (!comanda) return;

            // Enviamos petición al backend para actualizar estado en SQL Server
            fetch(`http://192.168.101.20:3000/api/kds/despachar/${comanda.id}`, { method: 'POST' })
                .then(res => {
                    if (res.ok) {
                        // Eliminamos el registro de tiempo local
                        delete tiemposDeOrdenes[comanda.id];

                        Object.keys(productosTachados).forEach(llave => {
                            if (llave.startsWith(`${comanda.id}-`)) {
                                delete productosTachados[llave];
                            }
                        });
                        delete notasAbiertas[comanda.id];
                        // Quitamos de la pantalla
                        espacioComandas.splice(index, 1);

                        if (colaDeEspera.length > 0) {
                            const siguienteComanda = colaDeEspera.shift();
                            espacioComandas.push(siguienteComanda);
                        } else {
                            espacioComandas.push(null);
                        }
                        renderizarPantalla();
                    } else {
                        console.error("El servidor no pudo despachar la comanda.");
                    }
                })
                .catch(err => console.error("No se pudo conectar al endpoint de despacho:", err));
        }

        // --- 5. TEMPORIZADOR LOCAL (SUMA TIEMPO REAL SEGUNDO A SEGUNDO) ---
        setInterval(() => {
            let cambios = false;
            espacioComandas.forEach(comanda => {
                if (comanda) {
                    comanda.segundosTranscurridos++;
                    tiemposDeOrdenes[comanda.id] = comanda.segundosTranscurridos; // Guardamos progreso
                    cambios = true;
                }
            });
            if (cambios) {
                renderizarPantalla();
            }
        }, 1000);

        // Consultar la Base de Datos automáticamente cada 3 segundos
        setInterval(consultarBaseDatosReal, 3000);
        
        function toggleTacharProducto(comandaId, productoIdx) {
            const llave = `${comandaId}-${productoIdx}`;
            productosTachados[llave] = !productosTachados[llave];
            renderizarPantalla(); // Redibujamos para aplicar el cambio visual
        }

        // --- 6. RENDERIZADO DE LA INTERFAZ ---
       // --- 6. RENDERIZADO DE LA INTERFAZ ---
  // --- 6. RENDERIZADO DE LA INTERFAZ ---
        function renderizarPantalla() {
            // --- NUEVO: 1. Guardar la posición actual del scroll de cada tarjeta activa ---
            const posicionesScroll = {};
            const tarjetasActivas = kdsGrid.querySelectorAll('.tarjeta-comanda');
            tarjetasActivas.forEach(tarjeta => {
                const idComandaSpan = tarjeta.querySelector('.id-comanda');
                const bodyTarjeta = tarjeta.querySelector('.tarjeta-body');
                if (idComandaSpan && bodyTarjeta) {
                    const idComanda = idComandaSpan.innerText.replace('ORDEN #', '').trim();
                    posicionesScroll[idComanda] = bodyTarjeta.scrollTop; // Guardamos los píxeles bajados
                }
            });

            kdsGrid.innerHTML = ''; // Limpiamos la pantalla normal

            espacioComandas.forEach((comanda, index) => {
                if (comanda === null) {
                    const divVacio = document.createElement('div');
                    divVacio.className = 'tarjeta-comanda vacía';
                    divVacio.innerText = `SLOT ${index + 1}`;
                    kdsGrid.appendChild(divVacio);
                } else {
                    const minutos = comanda.segundosTranscurridos / 60;
                    let claseSemaforo = 'comanda-normal';

                    if (minutos >= 4 && minutos < 8) {
                        claseSemaforo = 'comanda-advertencia';
                    } else if (minutos >= 8 && minutos < 12) { // Corregido: minutos en lugar de minutes
                        claseSemaforo = 'comanda-critico';
                    } else if (minutos >= 12) {
                        claseSemaforo = 'comanda-urgente';
                    }

                    const mm = String(Math.floor(comanda.segundosTranscurridos / 60)).padStart(2, '0');
                    const ss = String(comanda.segundosTranscurridos % 60).padStart(2, '0');

                    let notasDeLaOrden = [];
                    let htmlProductos = '';
             // NUEVO: Si la comanda tiene una nota de venta general, la agregamos al inicio
                    if (comanda.notaVenta && comanda.notaVenta.trim() !== "") {
                        notasDeLaOrden.push(comanda.notaVenta.trim());
                    }
                    // Recorremos los productos agregando el botón X interactivo
                    comanda.productos.forEach((p, pIdx) => {
                        const llaveProducto = `${comanda.id}-${pIdx}`;
                        const estaTachado = productosTachados[llaveProducto] || false;

                        const claseTachado = estaTachado ? 'completado' : '';
                        const claseBoton = estaTachado ? 'btn-tachar completado' : 'btn-tachar';

                        htmlProductos += `
                            <li class="fila-producto-sombreada">
                                <div class="producto-item-contenedor ${claseTachado}" style="display: flex; align-items: center; flex-grow: 1;">
                                    <span class="cant-item">${p.cant}</span>
                                    <span class="nombre-item">${p.nombre}</span>
                                </div>
                                <button class="${claseBoton}" onclick="toggleTacharProducto('${comanda.id}', ${pIdx})">X</button>
                            </li>
                        `;
                        if (p.notas && p.notas.trim() !== "" && p.notas.trim() !== "-") {
                            notasDeLaOrden.push(p.notas.trim());
                        }
                    });

                    let textoNotaFinal = notasDeLaOrden.join(" + ");

                    // --- NUEVA LÓGICA INTELIGENTE DE ASIGNACIÓN DE TEXTO ---
                    let textoCabecera = "";
                    if (comanda.tipo === "Delivery" || comanda.tipo === "Para Llevar") {
                        // Si hay cliente en la BD, lo encerramos en paréntesis
                        if (comanda.cliente) {
                            textoCabecera = `(${comanda.cliente})`;
                        } else {
                            // Si por algún motivo no hay cliente registrado, limpiamos etiquetas de la mesa
                            textoCabecera = comanda.mesa
                                .replace("!@DELIVERY@!", "")
                                .replace("!@PARA LLEVAR@!", "")
                                .trim();
                        }
                    } else {
                        // Si es consumo Local, mostramos la mesa tal cual
                        textoCabecera = comanda.mesa;
                    }

                    const divTarjeta = document.createElement('div');
                    divTarjeta.className = `tarjeta-comanda ${claseSemaforo}`;
                    divTarjeta.innerHTML = `
                        <div class="tarjeta-header">
                            <div class="header-identificadores">
                                <span class="id-comanda">ORDEN #${comanda.id}</span>
                                <span class="id-mesa">
                                    ${textoCabecera}
                                </span>
                            </div>
                            <div class="tipo-pedido-contenedor" title="${comanda.tipo}">
                                <img class="tipo-pedido-icon" src="${imagenesPedido[comanda.tipo] || imagenesPedido['Local']}" alt="${comanda.tipo}">
                            </div>
                        </div>

                        <div class="tarjeta-body">
                            <ul class="lista-productos">
                                ${htmlProductos}
                            </ul>
                        </div>
                    <!-- CAMBIO AQUÍ: Ahora lee de notasAbiertas[comanda.id] -->
                    ${(textoNotaFinal && notasAbiertas[comanda.id]) ? `
                            <div class="panel-alertas-nota">
                                ${textoNotaFinal}
                            </div>
                        ` : ''}

                        <div class="tarjeta-footer">
                            <span class="tiempo-transcurrido">${mm}:${ss}</span>

                        <!-- Si textoNotaFinal tiene texto y no está vacío, dibuja el botón. Si no, dibuja un espacio vacío -->
                            ${(textoNotaFinal && textoNotaFinal.trim() !== "") ? `
                                <button class="btn-nota" onclick="toggleNota(${index})">NOTA</button>
                            ` : `<div style="flex-grow:1;"></div>`}

                            <button class="btn-despachar" onclick="despacharComanda(${index})">Listo</button>
                        </div>
                    `;
                    kdsGrid.appendChild(divTarjeta);

                    // --- NUEVO: 2. Restaurar el scroll guardado de esta tarjeta ---
                    if (posicionesScroll[comanda.id] !== undefined) {
                        const bodyReciente = divTarjeta.querySelector('.tarjeta-body');
                        if (bodyReciente) {
                            bodyReciente.scrollTop = posicionesScroll[comanda.id];
                        }
                    }
                }
            });
        }

        // --- 7. CARGA INICIAL ---
        window.addEventListener('DOMContentLoaded', () => {
            consultarBaseDatosReal();
        });
    </script>
</body>
</html>
